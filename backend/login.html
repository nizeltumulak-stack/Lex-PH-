<!DOCTYPE html>
<html>
<head>
<title>LexPH Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'DM Sans', sans-serif; background: #f5f2ed; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
.login-card { background: #faf9f8; padding: 40px; border-radius: 12px; box-shadow: 0 12px 32px rgba(26,20,16,0.22); width: 100%; max-width: 380px; }
.logo { text-align: center; margin-bottom: 24px; }
.logo img { width: 56px; height: 56px; object-fit: contain; }
h1 { font-size: 24px; color: #1a1410; margin-bottom: 8px; text-align: center; }
.subtitle { color: #4a4133; font-size: 14px; text-align: center; margin-bottom: 32px; }
.form-group { margin-bottom: 20px; }
label { display: block; font-size: 12px; font-weight: 600; color: #4a4133; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
input { width: 100%; padding: 14px; border: 1px solid rgba(90,77,62,0.25); border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: border-color 0.2s; }
input:focus { outline: none; border-color: #9a7c3e; box-shadow: 0 0 0 3px rgba(154,124,62,0.1); }
.btn { width: 100%; padding: 14px; background: #9a7c3e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; transition: background 0.2s; }
.btn:hover { background: #7a5c2e; transform: translateY(-1px); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.links { text-align: center; margin-top: 20px; font-size: 14px; }
.links a { color: #9a7c3e; text-decoration: none; font-weight: 500; }
.links a:hover { text-decoration: underline; }
.error { background: #fce8e5; color: #b83224; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; border-left: 4px solid #b83224; }
.success { background: #e0f0ee; color: #2a6b60; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; border-left: 4px solid #2a6b60; }
.demo-info { background: #e8f4fc; color: #1a5276; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; text-align: center; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <img src="lexph logo.svg" alt="LexPH" />
  </div>
  <h1>Welcome Back</h1>
  <div class="subtitle">Sign in to continue your legal research</div>
  
  <div class="demo-info">
    <strong>Demo:</strong> test / test &nbsp; | &nbsp; admin / adminpass
  </div>
  
  <form id="loginForm">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" required autocomplete="username" placeholder="Enter username">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password" placeholder="Enter password">
    </div>
    <button type="submit" class="btn" id="loginBtn">Sign In</button>
  </form>
  
  <div class="links">
    Don't have an account? <a href="register-modal.html">Create one</a>
  </div>
</body>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const messageDiv = document.querySelector('.demo-info');
  
  if (!username || !password) {
    showError('Username and password required');
    return;
  }
  
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  messageDiv.textContent = 'Authenticating...';
  
  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await response.json();
    
    if (response.ok && data.token) {
      localStorage.setItem('lexph_token', data.token);
      localStorage.setItem('lexph_user', JSON.stringify(data.user));
      showSuccess('Login successful! Redirecting...');
      setTimeout(() => {
        window.location.href = 'user-home.html';
      }, 1000);
    } else {
      showError(data.error || 'Login failed');
    }
  } catch (err) {
    showError('Server error. Please try again.');
    console.error('Login error:', err);
  } finally {
    btn.textContent = 'Sign In';
    btn.disabled = false;
    messageDiv.textContent = 'Demo: test/test | admin/adminpass';
  }
});

function showError(msg) {
  clearMessages();
  const div = document.createElement('div');
  div.className = 'error';
  div.textContent = msg;
  document.querySelector('.login-card').insertBefore(div, document.querySelector('.form-group'));
}

function showSuccess(msg) {
  clearMessages();
  const div = document.createElement('div');
  div.className = 'success';
  div.textContent = msg;
  document.querySelector('.login-card').insertBefore(div, document.querySelector('.form-group'));
}

function clearMessages() {
  document.querySelectorAll('.error, .success').forEach(el => el.remove());
}
</script>
</html>
