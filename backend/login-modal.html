<!DOCTYPE html>
<html>
<head>
<title>LexPH Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'DM Sans', sans-serif; background: #f5f2ed; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
.login-card { background: #faf9f8; padding: 32px; border-radius: 12px; box-shadow: 0 12px 32px rgba(26,20,16,0.22); width: 100%; max-width: 360px; }
.logo { text-align: center; margin-bottom: 20px; }
.logo img { width: 48px; height: 48px; object-fit: contain; }
h1 { font-size: 22px; color: #1a1410; margin-bottom: 8px; text-align: center; }
.subtitle { color: #4a4133; font-size: 13px; text-align: center; margin-bottom: 24px; }
.form-group { margin-bottom: 18px; }
label { display: block; font-size: 11px; font-weight: 600; color: #4a4133; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
input { width: 100%; padding: 12px; border: 1px solid rgba(90,77,62,0.25); border-radius: 6px; font-size: 15px; box-sizing: border-box; }
input:focus { outline: none; border-color: #9a7c3e; }
.btn { width: 100%; padding: 12px; background: #9a7c3e; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
.btn:hover { background: #7a5c2e; }
.btn-close { background: #e8e3d8; color: #5a4d3e; margin: 0; padding: 10px 20px; width: auto; }
.btn-close:hover { background: #d8d3c8; }
.links { text-align: center; margin-top: 16px; }
.links a { color: #9a7c3e; text-decoration: none; font-size: 13px; }
.error { background: #fce8e5; color: #b83224; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
.success { background: #e0f0ee; color: #2a6b60; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <img src="../lexph logo.svg" alt="LexPH" />
  </div>
  <h1>Sign In</h1>
  <div class="subtitle">Access your LexPH research dashboard</div>
  
  <form id="loginForm" onsubmit="handleLogin(event); return false;">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUsername" required autocomplete="username" placeholder="Enter username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="Enter password">
    </div>
    <button type="submit" class="btn" id="loginBtn">Sign In</button>
  </form>
  
  <button class="btn-close" onclick="window.close()">Close</button>
  
  <div class="links">
    Need account? <a href="#" onclick="window.open('../register-modal.html'); return false;">Create one</a>
  </div>
</body>
<script>
async function handleLogin(event) {
  event.preventDefault();
  const btn = document.getElementById('loginBtn');
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  
  if (!username || !password) {
    showError('Please enter username and password');
    return;
  }
  
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  
  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    
    const data = await response.json();
    
    if (response.ok && data.token) {
      // Success
      localStorage.setItem('lexph_token', data.token);
      showSuccess('Login successful!');
      setTimeout(() => {
        window.opener.location.reload();
        window.close();
      }, 1200);
    } else {
      showError(data.error || 'Invalid credentials');
    }
  } catch (err) {
    showError('Network error. Check if server is running.');
  } finally {
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
}

function showError(msg) {
  removeMessages();
  const div = document.createElement('div');
  div.className = 'error';
  div.textContent = msg;
  div.style.marginBottom = '16px';
  document.querySelector('.login-card').insertBefore(div, document.querySelector('.form-group'));
}

function showSuccess(msg) {
  removeMessages();
  const div = document.createElement('div');
  div.className = 'success';
  div.textContent = msg;
  div.style.marginBottom = '16px';
  document.querySelector('.login-card').insertBefore(div, document.querySelector('.form-group'));
}

function removeMessages() {
  document.querySelectorAll('.error, .success').forEach(el => el.remove());
}
</script>
</html>
