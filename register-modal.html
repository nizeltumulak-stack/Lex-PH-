<!DOCTYPE html>
<html>
<head>
<title>LexPH Register</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'DM Sans', sans-serif; background: #f5f2ed; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
.register-card { background: #faf9f8; padding: 32px; border-radius: 12px; box-shadow: 0 12px 32px rgba(26,20,16,0.22); width: 100%; max-width: 360px; }
.logo { text-align: center; margin-bottom: 20px; }
.logo img { width: 48px; height: 48px; object-fit: contain; }
h1 { font-size: 22px; color: #1a1410; margin-bottom: 8px; text-align: center; }
.subtitle { color: #4a4133; font-size: 13px; text-align: center; margin-bottom: 24px; }
.form-group { margin-bottom: 18px; }
label { display: block; font-size: 11px; font-weight: 600; color: #4a4133; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
input { width: 100%; padding: 12px; border: 1px solid rgba(90,77,62,0.25); border-radius: 6px; font-size: 15px; box-sizing: border-box; }
input:focus { outline: none; border-color: #9a7c3e; }
.btn { width: 100%; padding: 12px; background: #9a7c3e; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
.btn:hover { background: #7a5c2e; }
.btn-close { background: #e8e3d8; color: #5a4d3e; margin: 0; padding: 10px 20px; width: auto; }
.btn-close:hover { background: #d8d3c8; }
.links { text-align: center; margin-top: 16px; }
.links a { color: #9a7c3e; text-decoration: none; font-size: 13px; }
.error { background: #fce8e5; color: #b83224; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
.success { background: #e0f0ee; color: #2a6b60; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
</style>
</head>
<body>

<div class="register-card">
  <div class="logo">
    <img src="lexph logo.svg" alt="LexPH" />
  </div>
  <h1>Create Account</h1>
  <div class="subtitle">Start your 14-day free trial</div>
  
  <form id="registerForm" onsubmit="handleRegister(event); return false;">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="regUsername" required autocomplete="username" placeholder="Choose username">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" required autocomplete="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div style="position:relative">
        <input type="password" id="regPassword" required autocomplete="new-password" placeholder="Minimum 6 characters" minlength="6" style="padding-right:44px">
        <button type="button" onclick="togglePw('regPassword','eyeReg')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8a7b6a;font-size:16px;padding:0;line-height:1" id="eyeReg">👁</button>
      </div>
    </div>
    <button type="submit" class="btn" id="registerBtn">Create Account</button>
  </form>
  
  <button class="btn-close" onclick="window.location.href='index.html'">Close</button>
  
  <div class="links">
    Already have account? <a href="#" onclick="showLoginFromRegister(); return false;">Sign in</a>
  </div>
</body>
<script>
function togglePw(inputId, btnId) {
  const input = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

async function handleRegister(event) {
  event.preventDefault();
  const btn = document.getElementById('registerBtn');
  const username = document.getElementById('regUsername').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  
  if (password.length < 6) {
    showError('Password must be at least 6 characters');
    return;
  }
  
  btn.textContent = 'Creating...';
  btn.disabled = true;
  
  try {
    // Save user account with password for login verification
    const accounts = JSON.parse(localStorage.getItem('lexph_accounts') || '[]');
    const exists = accounts.find(a => a.username === username || a.email === email);
    if (exists) {
      showError(exists.username === username ? 'Username already taken.' : 'Email already registered.');
      btn.textContent = 'Create Account';
      btn.disabled = false;
      return;
    }
    const newUser = { username, email, password, role: 'user', full_name: username };
    accounts.push(newUser);
    localStorage.setItem('lexph_accounts', JSON.stringify(accounts));

    // Set as current logged-in user (without exposing password in session)
    localStorage.setItem('lexph_user', JSON.stringify({
      username,
      email,
      role: 'user',
      full_name: username
    }));
    
    const successDiv = document.createElement('div');
    successDiv.className = 'success';
    successDiv.textContent = 'Account created! 14-day trial activated.';
    document.getElementById('registerForm').insertAdjacentElement('beforebegin', successDiv);
    
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1500);
  } catch (error) {
    showError('Registration failed. Try again.');
  } finally {
    btn.textContent = 'Create Account';
    btn.disabled = false;
  }
}

function showLoginFromRegister() {
  window.location.href = 'login-modal.html';
}

function showError(msg) {
  const existing = document.querySelector('.error');
  if (existing) existing.remove();
  const errorDiv = document.createElement('div');
  errorDiv.className = 'error';
  errorDiv.textContent = msg;
  document.getElementById('registerForm').insertAdjacentElement('beforebegin', errorDiv);
}
</script>
</html>
